services:
  ai-service:
    build: .
    command: uvicorn ai_service.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      SERVICE_NAME: ai-service-starter
      SERVICE_TITLE: AI Service Starter
      SERVICE_VERSION: 0.1.0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      PROMPT_VERSION: ${PROMPT_VERSION:-v1}
      AUTO_INDEX_ON_STARTUP: ${AUTO_INDEX_ON_STARTUP:-false}
      STUDENT_SERVICE_BASE_URL: http://student-service:8001
      STUDENT_SERVICE_TIMEOUT_SECONDS: 5
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    depends_on:
      - student-service

  student-service:
    build: .
    command: uvicorn student_service.student_data_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  mcp-service:
    build: .
    command: python -m mcp_service.mcp_server
    environment:
      MCP_TRANSPORT: stdio
      STUDENT_SERVICE_BASE_URL: http://student-service:8001
      STUDENT_SERVICE_TIMEOUT_SECONDS: 5
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      PROMPT_VERSION: ${PROMPT_VERSION:-v1}
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    depends_on:
      - student-service
    stdin_open: true
    tty: true
