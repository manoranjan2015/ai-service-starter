<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Student Study Tracker Chat</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #d8dde6;
      --text: #18202f;
      --muted: #667085;
      --accent: #1f6feb;
      --accent-dark: #174ea6;
      --ok: #0f7b46;
      --error: #b42318;
      --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 16px;
      align-self: start;
    }

    .chat {
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h2 {
      margin: 20px 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
    }

    h2:first-child {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 11px;
      color: var(--text);
      background: #fff;
      font: inherit;
      font-size: 14px;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--muted);
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.error {
      background: var(--error);
    }

    .messages {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fbfcfe;
    }

    .message {
      max-width: 860px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #edf4ff;
      border-color: #bed7ff;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.error {
      border-color: #f3b8b1;
      background: #fff4f2;
      color: var(--error);
    }

    .meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      font-size: 12px;
      background: #fff;
    }

    .composer {
      padding: 14px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      background: #fff;
    }

    .sample-list {
      display: grid;
      gap: 8px;
    }

    .sample-list button {
      text-align: left;
      line-height: 1.35;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
    }

    details {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    pre {
      overflow: auto;
      background: #101828;
      color: #eef4ff;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }

      .chat {
        min-height: 70vh;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <aside class="panel sidebar">
      <h2>Connection</h2>
      <label for="apiBase">AI service URL</label>
      <input id="apiBase" value="http://127.0.0.1:8000">

      <div class="row">
        <div>
          <label for="conversationId">Conversation</label>
          <input id="conversationId" value="demo-ui">
        </div>
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="simple">simple</option>
            <option value="detailed" selected>detailed</option>
            <option value="summary">summary</option>
            <option value="interview">interview</option>
          </select>
        </div>
      </div>

      <h2>Questions</h2>
      <div class="sample-list">
        <button type="button" data-sample="What should I revise this weekend based on last week lessons, upcoming exams, and recent scores?">Weekend revision plan</button>
        <button type="button" data-sample="When is my next exam?">Next exam</button>
        <button type="button" data-sample="What was my score in the last class test?">Last score</button>
        <button type="button" data-sample="What was taught last week?">Last week lessons</button>
        <button type="button" data-sample="Make that revision plan shorter.">Memory follow-up</button>
      </div>

      <h2>Actions</h2>
      <button id="healthButton" type="button">Check health</button>
      <button id="clearButton" type="button">Clear chat</button>
    </aside>

    <section class="panel chat">
      <header class="header">
        <div>
          <h1>AI Student Study Tracker</h1>
          <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">Not checked</span></div>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="message assistant">Ask about exams, scores, weekly lessons, or a revision plan.</div>
      </div>

      <form id="chatForm" class="composer">
        <textarea id="messageInput" placeholder="Type a student study question..." required></textarea>
        <button id="sendButton" class="primary" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const apiBaseInput = document.getElementById("apiBase");
    const conversationIdInput = document.getElementById("conversationId");
    const modeInput = document.getElementById("mode");
    const messageInput = document.getElementById("messageInput");
    const messages = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const sendButton = document.getElementById("sendButton");
    const healthButton = document.getElementById("healthButton");
    const clearButton = document.getElementById("clearButton");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    function apiBase() {
      return apiBaseInput.value.replace(/\/$/, "");
    }

    function setStatus(kind, text) {
      statusDot.className = `dot ${kind || ""}`;
      statusText.textContent = text;
    }

    function addMessage(role, text, data) {
      const element = document.createElement("div");
      element.className = `message ${role}`;
      element.textContent = text;

      if (data) {
        const meta = document.createElement("div");
        meta.className = "meta";

        const citationCount = data.citations ? data.citations.length : 0;
        const stepCount = data.steps ? data.steps.length : 0;
        const mcpCount = data.mcp_results ? data.mcp_results.length : 0;

        [
          `citations: ${citationCount}`,
          `steps: ${stepCount}`,
          `mcp results: ${mcpCount}`,
          `prompt: ${data.prompt_version || "n/a"}`
        ].forEach((label) => {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = label;
          meta.appendChild(pill);
        });

        const details = document.createElement("details");
        const summary = document.createElement("summary");
        const pre = document.createElement("pre");
        summary.textContent = "Response details";
        pre.textContent = JSON.stringify({
          citations: data.citations || [],
          steps: data.steps || [],
          mcp_results: data.mcp_results || []
        }, null, 2);
        details.appendChild(summary);
        details.appendChild(pre);

        element.appendChild(meta);
        element.appendChild(details);
      }

      messages.appendChild(element);
      messages.scrollTop = messages.scrollHeight;
    }

    async function checkHealth() {
      try {
        setStatus("", "Checking");
        const response = await fetch(`${apiBase()}/health`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        setStatus("ok", `${data.service}: ${data.status}`);
      } catch (error) {
        setStatus("error", "AI service unavailable");
        addMessage("error", `Health check failed: ${error.message}`);
      }
    }

    async function sendMessage(message) {
      const payload = {
        conversation_id: conversationIdInput.value.trim() || "demo-ui",
        message,
        mode: modeInput.value
      };

      addMessage("user", message);
      sendButton.disabled = true;
      sendButton.textContent = "Sending";

      try {
        const response = await fetch(`${apiBase()}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || `HTTP ${response.status}`);
        }

        addMessage("assistant", data.answer || "", data);
        setStatus("ok", "Connected");
      } catch (error) {
        addMessage("error", `Chat request failed: ${error.message}`);
        setStatus("error", "Request failed");
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = "Send";
      }
    }

    document.querySelectorAll("[data-sample]").forEach((button) => {
      button.addEventListener("click", () => {
        messageInput.value = button.dataset.sample;
        messageInput.focus();
      });
    });

    healthButton.addEventListener("click", checkHealth);

    clearButton.addEventListener("click", () => {
      messages.innerHTML = "";
      addMessage("assistant", "Chat cleared.");
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) {
        return;
      }
      messageInput.value = "";
      sendMessage(message);
    });

    checkHealth();
  </script>
</body>
</html>
